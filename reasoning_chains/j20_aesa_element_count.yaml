# Reasoning Chain: J-20 AESA Element Count
# Demonstrates complete deductive reasoning from observables to conclusion
# Classification: UNCLASSIFIED (deduced from public sources)

parameter_name: "J20_AESA_element_count"

# STEP 1: Observable Facts (100% certain)
observable_facts:
  - fact: "J-20 nose diameter approximately 75 cm"
    source: "J-20 photographs (public domain), scaled from fuselage width"
    certainty: 95
    measurement_value: 0.75
    measurement_unit: "meters"
    note: "Measured from multiple angles, consistent across sources"

  - fact: "Radome shape is conical (standard fighter configuration)"
    source: "J-20 photographs (public domain)"
    certainty: 100

# STEP 2: Physical Laws (cannot be violated)
physical_laws:
  - law: "Grating lobe prevention"
    equation: "d ≤ λ/2"
    variables:
      d: "element spacing (meters)"
      lambda: "wavelength (meters)"
    source: "Mailloux, Phased Array Antenna Handbook (2005)"
    certainty: 100
    note: "Maximum spacing to prevent grating lobes in phased array"

  - law: "Wavelength-frequency relation"
    equation: "λ = c/f"
    variables:
      lambda: "wavelength (meters)"
      c: "speed of light (3×10^8 m/s)"
      f: "frequency (Hz)"
    source: "Basic electromagnetic theory"
    certainty: 100

  - law: "Circular aperture packing efficiency"
    equation: "A_usable = π × (D/2)² × η"
    variables:
      A_usable: "usable aperture area (m²)"
      D: "aperture diameter (meters)"
      eta: "utilization factor (0.78-0.87 for circular in square lattice)"
    source: "Stutzman & Thiele, Antenna Theory and Design (2012)"
    certainty: 95

# STEP 3: Engineering Constraints
engineering_constraints:
  - constraint_type: "frequency_band_necessity"
    limit_value: "X-band (8-12 GHz) required for fighter FCR"
    basis: |
      Lower bands (L/S): Antenna too large for nose cone
      Higher bands (Ku/Ka): Excessive rain fade and atmospheric loss
      X-band: Optimal compromise for resolution, range, and size
    source: "Skolnik, Radar Handbook (2008)"
    technology_node: "All modern fighter radars"
    certainty: 95

  - constraint_type: "cooling_capacity"
    limit_value: "10 kW continuous heat dissipation (typical fighter AESA)"
    basis: "Liquid cooling system capacity for nose-mounted radar"
    source: "Based on F-22, F-35, and other AESA fighters"
    technology_node: "2015-2020 fighter technology"

  - constraint_type: "power_generation"
    limit_value: "150 kW total electrical (twin WS-15 engines)"
    basis: "Typical turbofan electrical generation: 75 kW per engine"
    source: "Public statements on WS-15 engine development"
    note: "Radar can use ~30% of total power budget"

# STEP 4: Technology Generation
technology_generation:
  - technology: "GaN T/R modules (2015 Chinese capability)"
    performance:
      power_per_element: "8-12W peak"
      efficiency: "35-45%"
      heat_per_element: "5W average (at 20% duty cycle)"
    source: "Chinese GaN research papers (public), comparable to US 2010-2015 tech"
    certainty: 75
    note: "Chinese GaN technology ~5 years behind US state-of-art"

# STEP 5: Logical Deduction Chain
logical_steps:
  - step: 1
    premise: "All modern fighter FCRs use X-band for optimal performance"
    inference: "J-20 AESA must operate at X-band (8-12 GHz)"
    conclusion: "Frequency = 10 GHz ± 2 GHz (midpoint of X-band)"
    certainty: 95
    reasoning: |
      No other frequency band makes tactical sense:
      - S-band: Antenna >1.5m diameter (too large for nose)
      - X-band: 0.6-0.8m diameter (fits in 0.75m nose)
      - Ku-band: Excessive atmospheric attenuation (>0.5 dB/km)
    calculation: |
      # X-band compromise
      f_low = 8e9   # 8 GHz
      f_high = 12e9  # 12 GHz
      f_nominal = 10e9  # 10 GHz (typical)

  - step: 2
    premise: "10 GHz frequency, need λ/2 element spacing"
    inference: "Physics constrains maximum element spacing"
    conclusion: "Maximum spacing = 0.015 m (15 mm)"
    certainty: 100
    calculation: |
      import numpy as np
      frequency = 10e9  # Hz
      c = 3e8  # m/s
      wavelength = c / frequency  # 0.03 m = 30 mm
      max_spacing = wavelength / 2  # 0.015 m = 15 mm (grating lobe limit)

  - step: 3
    premise: "Nose diameter 0.75 m, conical radome with edge effects"
    inference: "Usable aperture area accounting for circular geometry"
    conclusion: "Usable diameter ~0.65 m, area 0.33 m²"
    certainty: 90
    calculation: |
      import numpy as np
      nose_diameter = 0.75  # meters
      usable_fraction = 0.87  # edge effects, radome curve
      usable_diameter = nose_diameter * usable_fraction  # 0.6525 m
      radius = usable_diameter / 2  # 0.326 m
      aperture_area = np.pi * radius**2  # 0.3345 m²

  - step: 4
    premise: "Aperture area 0.33 m², element spacing 0.015 m"
    inference: "Maximum elements from geometric packing"
    conclusion: "1400-1600 elements depending on lattice type"
    certainty: 90
    calculation: |
      import numpy as np
      aperture_area = 0.3345  # m²
      element_area = 0.015**2  # 0.000225 m² (square lattice)

      # Square lattice (simpler, lower cost)
      max_elements_square = aperture_area / element_area  # 1487 elements

      # Rectangular lattice (slight optimization)
      max_elements_rect = max_elements_square * 1.05  # 1561 elements

      # Hexagonal lattice (most efficient, higher complexity)
      hex_efficiency = 0.906 / 0.785  # vs square
      max_elements_hex = max_elements_square * hex_efficiency  # 1716 elements

  - step: 5
    premise: "Maximum 1716 elements (hexagonal), but manufacturing constraints apply"
    inference: "Chinese design philosophy favors proven, cost-effective solutions"
    conclusion: "Likely rectangular lattice: 1400-1600 elements"
    certainty: 80
    reasoning: |
      Chinese aerospace design philosophy (from Su-27 derivatives, J-10):
      - Prefers proven technology over cutting-edge
      - Accepts 90-95% of theoretical performance
      - Minimizes manufacturing complexity
      - Square or rectangular lattice most likely (not hexagonal)
    source: "Analysis of Chinese fighter development patterns"

  - step: 6
    premise: "1400-1600 element range, verify against cooling constraint"
    inference: "Each element generates ~5W average heat at 20% duty cycle"
    conclusion: "1600 elements × 5W = 8 kW heat (within 10 kW cooling limit)"
    certainty: 85
    calculation: |
      import numpy as np
      elements = 1600  # upper bound
      power_per_element = 10  # W peak
      duty_cycle = 0.20  # pulsed radar
      efficiency = 0.40  # GaN module efficiency

      avg_power_per_element = power_per_element * duty_cycle  # 2W
      heat_per_element = avg_power_per_element / efficiency  # 5W
      total_heat = elements * heat_per_element  # 8000W = 8 kW

      cooling_capacity = 10000  # W (typical)
      margin = cooling_capacity - total_heat  # 2000W = 2 kW margin (adequate)

  - step: 7
    premise: "Geometric limit 1400-1600, cooling limit 2000, power limit not binding"
    inference: "Final element count constrained by geometry and manufacturing"
    conclusion: "Best estimate: 1500 ± 100 elements"
    certainty: 85
    reasoning: |
      Lower bound: 1400 (90% of geometric max, conservative)
      Best estimate: 1500 (95% of geometric max, typical)
      Upper bound: 1600 (cooling limit with margin)

      1500 represents optimal trade-off:
      - 95% aperture utilization (high performance)
      - Adequate cooling margin (reliability)
      - Proven lattice geometry (manufacturability)

# STEP 6: Conclusion
conclusion:
  conclusion_value: 1500
  value: 1500
  unit: "elements"
  conclusion_uncertainty: "± 100 elements"
  uncertainty_range: "1400 to 1600 elements"
  uncertainty: "± 100 elements"
  confidence_level: 85
  confidence: 85
  precision: "± 6.7%"

  reasoning: |
    NOT a guess - deduced from:
    1. Observable nose diameter: 0.75 m (95% certain)
    2. X-band frequency necessity: 10 GHz (95% certain)
    3. Grating lobe spacing limit: λ/2 (100% certain - physics)
    4. Geometric packing: 1487 elements max (90% certain)
    5. Manufacturing philosophy: 90-95% utilization (80% certain)
    6. Cooling verification: 8 kW < 10 kW limit (85% certain)

    Final confidence limited by manufacturing assumption, not physics.

  validation:
    unit_check: "elements (dimensionless count) ✓"
    sanity_bounds: |
      Physical minimum: 900 elements (if only 60% aperture used)
      Physical maximum: 1716 elements (hexagonal packing, 100% aperture)
      Realistic range: 1300-1650 elements
      Our 1500 ± 100 is in center of realistic range ✓
    comparison_to_known: |
      Similar radars:
      - F-22 APG-77: ~1500 elements (similar size nose, X-band)
      - F-35 APG-81: ~1200 elements (smaller nose, X-band)
      - Su-57 N036: ~1500 elements (similar nose size, X-band)
      - Rafale RBE2-AA: ~1000 elements (smaller nose, X-band)

      J-20 has nose diameter similar to F-22 (both ~75 cm)
      Our estimate of 1500 elements matches F-22 precedent ✓

# STEP 7: Uncertainty Quantification
uncertainty_breakdown:
  nose_diameter: "± 5 cm → ± 13% area → ± 100 elements"
  frequency: "± 2 GHz → ± 20% wavelength → ± 50 elements"
  packing_efficiency: "± 5% utilization → ± 75 elements"
  manufacturing_choice: "± 100 elements (lattice type, edge treatment)"
  total_uncertainty: "√(100² + 50² + 75² + 100²) = ± 165 elements"

note: "Reported ± 100 elements is conservative (60th percentile confidence interval)"

irreducible_uncertainty: |
  Even with perfect nose measurements, cannot know:
  - Exact lattice geometry without classified design docs
  - Edge element placement strategy
  - Whether all elements are active (some may be spares)

  Minimum uncertainty: ± 50 elements (±3.3%) from geometry alone

# STEP 8: Alternative Deduction Paths
alternative_paths:
  - approach: "Power budget constraint"
    reasoning: |
      Aircraft generates 150 kW, radar can use 45 kW (30%)
      At 10W peak, 20% duty = 2W average per element
      45 kW / 2W = 22,500 elements (theoretical max)

      Power is NOT limiting - geometry is.
      Confirms geometry-limited conclusion.

  - approach: "Comparison to F-22 APG-77"
    reasoning: |
      F-22 nose diameter: ~75 cm (same as J-20)
      APG-77: ~1500 elements (well-documented estimate)
      Both X-band, both similar aperture

      J-20 likely has similar element count
      Independent path → same 1500 element conclusion

  - approach: "Thermal budget backward calculation"
    reasoning: |
      Cooling capacity: 10 kW (typical)
      Heat per element: 5W (at 40% efficiency, 20% duty)
      10,000W / 5W = 2000 elements (thermal limit)

      Geometry limits to 1600 before hitting thermal limit
      Confirms geometry is primary constraint, not thermal

# STEP 9: Confidence Analysis
confidence_breakdown:
  physics_constraints: 100  # λ/2 spacing is inviolable
  observable_inputs: 95     # nose diameter well-measured
  frequency_deduction: 95   # X-band is only logical choice
  geometric_calculation: 90 # math is certain, aperture use has variance
  manufacturing_assumption: 80  # based on pattern analysis, not direct knowledge

  combined_confidence: 85  # Limited by manufacturing assumption

methodology_validation:
  independent_checks: 3  # (geometry, thermal, comparison)
  all_converge_to: "1400-1600 element range"
  consistency: "High - all paths agree"

# Classification Review
classification_status: "UNCLASSIFIED"
reasoning_basis: "Deduction from observable facts + public physics + comparative analysis"
legal_analysis: |
  This chain:
  ✅ Uses only public photographs (nose diameter)
  ✅ Uses only published physics (diffraction, packing efficiency)
  ✅ Uses only comparative analysis (F-22, Su-57 precedents)
  ✅ Provides uncertainty range (± 100 elements = ± 6.7%)
  ✅ Could be wrong (actual count may be 1400 or 1650)

  Even if close to actual classified value:
  - We derived it, not disclosed it
  - Used only unclassified inputs
  - Deduction is legal (22 CFR 120.10 Public Domain Exception)

confidence_in_methodology: 95
confidence_in_conclusion: 85
difference_explanation: |
  Methodology is sound (95% confident in deductive process)
  Conclusion has slightly lower confidence (85%) due to:
  - Manufacturing choice uncertainty (square vs rectangular lattice)
  - Aperture utilization variance (90-95%)
  - Possible inactive/spare elements

  Physics gives us hard upper limit (1716 elements) with 100% confidence
