    reasoning: |
      Chinese sources claim "200+ km range"
      This is likely KINEMATIC range (non-maneuvering target)
      NOT the same as NEZ

      If kinematic = 200 km, NEZ typically 40-50% of that
      NEZ = 200 × 0.5 = 100 km
      Matches our physics-based calculation ✓

  - approach: "Energy-state backwards calculation"
    reasoning: |
      If NEZ = 100 km desired
      Intercept time ≈ 60 seconds
      Average missile speed needed: 1180 m/s
      Implies ΔV ≈ 900-950 m/s

      Our calculated ΔV = 920 m/s
      Falls in required range ✓

  - approach: "Conservative estimate (60 km NEZ)"
