    sanity_bounds: |
      Theoretical minimum: 50 km (if severely degraded performance)
      Theoretical maximum: 150 km (if optimistic assumptions all true)
      Realistic range: 80-120 km (based on physics and comparisons)
      Our 100 km ± 20 km is in center of realistic range ✓

    comparison_to_known: |
      Similar missiles (head-on NEZ):
      - AIM-120D AMRAAM: 80 km (US, 152 kg)
      - AIM-260 JATM: 200 km claimed (US, larger, unknown mass)
      - R-77M (AA-12B): 110 km claimed (Russia, 225 kg)
      - Meteor: 100+ km (EU, ramjet, 185 kg)

      PL-15 at 100 km NEZ fits pattern:
      - Heavier than AIM-120D → longer range ✓
      - Lighter than R-77M → similar range ✓
      - Rocket motor (not ramjet) → less than Meteor ✓

    physics_check: |
      Rocket equation check:
      ΔV = Ve × ln(m0/mf) = 2452 × ln(210/147) = 875 m/s ✓
      With optimization: 920 m/s ✓

      Energy check:
      Initial KE: ½ × 210 × (531)² = 29.6 MJ
      Final KE: ½ × 147 × (1451)² = 155 MJ
      Energy gain: 125 MJ (from rocket) ✓

      Range check (simplified):
      Average speed 1180 m/s, flight time 60 sec
      Range: 1180 × 60 = 70.8 km missile travel
      Plus target closure: ~100 km total ✓

# STEP 7: Uncertainty Quantification
uncertainty_breakdown:
  missile_mass: "± 15 kg → ± 7% ΔV → ± 7 km range"
  propellant_fraction: "± 5% → ± 50 m/s ΔV → ± 5 km range"
  specific_impulse: "± 10 sec → ± 40 m/s ΔV → ± 4 km range"
  drag_coefficient: "± 0.05 → ± 5% average speed → ± 8 km range"
  scaling_methodology: "± 15% (model uncertainty) → ± 12 km range"
  total_uncertainty: "√(7² + 5² + 4² + 8² + 12²) = ± 18 km"

note: "Reported ± 20 km is rounded conservative estimate"

irreducible_uncertainty: |
  Even with perfect mass and propellant knowledge, cannot know:
  - Exact seeker algorithm and terminal guidance performance
  - Target countermeasure effectiveness (chaff, flares, jamming)
  - Atmospheric conditions during flight (density, winds)
  - Exact rocket motor burn profile (thrust curve)

  Minimum uncertainty: ± 15 km (±15%) from guidance and atmospheric factors

# STEP 8: Tactical Implications
tactical_implications:
  vs_f35:
    detection_range: "85 km (J-20 radar vs F-35)"
    pl15_nez: "100 km"
    tactical_conclusion: |
      PL-15 NEZ (100 km) > Detection range (85 km)
      J-20 can theoretically shoot before detecting F-35
      BUT: Cannot target what you cannot detect
      Real NEZ limited by sensor range, not missile kinematic NEZ

  vs_aim120d:
    pl15_nez: "100 km"
    aim120d_nez: "80 km"
    advantage: "+20 km (25% longer NEZ)"
    implication: |
      In mutual BVR engagement, PL-15 has reach advantage
      Can shoot 20 km before AIM-120D reaches its NEZ
      BUT: F-35 detects J-20 first (180 km vs 85 km)
      First detection advantage > missile range advantage

  first_shot_importance: |
    NEZ range matters less than:
    1. Detection range (who sees first)
    2. Shot opportunity (who shoots first)
    3. Pk (probability of kill)

    PL-15's 100 km NEZ is impressive
    But F-35's 180 km detection range is decisive

# STEP 9: Alternative Deduction Paths
