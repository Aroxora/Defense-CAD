# Reasoning Chain: MADL Sidelobe Detection Range (passive ESM)
# Estimates the range at which a non-cooperative ESM receiver could detect
# F-35 MADL sidelobe emissions, from link-budget + detection physics.
# Classification: UNCLASSIFIED (derived from public sources only)
#
# REVISION NOTE (2026): An earlier version assumed an integration gain of
# ~24 dB (effectively *coherent* N-pulse integration) and reported ~60 km.
# That gain is not physically available to a non-cooperative ESM that does
# not know the MADL spreading code / burst timing; such a receiver is limited
# to NON-COHERENT integration, whose SNR gain scales as ~sqrt(N) (~13.5 dB for
# N=500), not 27 dB. The corrected non-coherent estimate is ~25 km. The
# coherent case (~55 km) is retained only as an explicit upper bound. Every
# numeric step below was recomputed and cross-checked (see scripts in repo).

parameter_name: "MADL_sidelobe_detection_range"

# STEP 1: Inputs (from prior reasoning chains + public observation)
observable_facts:
  - fact: "MADL TX power ~2.0 W (derived from thermal constraints)"
    source: "reasoning_chains/madl_tx_power.yaml"
    certainty: 75
    measurement_value: 2.0
    measurement_unit: "watts"

  - fact: "MADL sidelobe level ~-30 dB (derived from array theory)"
    source: "reasoning_chains/madl_sidelobe_level.yaml"
    certainty: 70
    measurement_value: -30
    measurement_unit: "dB"

  - fact: "MADL beamformed antenna gain ~31.5 dBi (from aperture)"
    source: "Calculated from 6-aperture beamforming, ~15 cm apertures"
    certainty: 80
    measurement_value: 31.5
    measurement_unit: "dBi"

  - fact: "J-20 side-mounted ESM arrays approximately 30 cm x 10 cm"
    source: "J-20 photographs (public domain)"
    certainty: 75
    measurement_value: 0.03
    measurement_unit: "m^2"

# STEP 2: Physical Laws (cannot be violated)
physical_laws:
  - law: "Friis transmission equation"
    equation: "Pr = Pt * Gt * Gr * (lambda/(4*pi*R))^2"
    variables:
      Pr: "received power (W)"
      Pt: "transmitted power (W)"
      Gt: "transmit antenna gain (linear)"
      Gr: "receive antenna gain (linear)"
      lambda: "wavelength (m)"
      R: "range (m)"
    source: "Friis, 'A Note on a Simple Transmission Formula' (1946)"
    certainty: 100

  - law: "Thermal noise power"
    equation: "N = k * T * B"
    variables:
      N: "noise power (W)"
      k: "Boltzmann constant (1.38e-23 J/K)"
      T: "system noise temperature (K)"
      B: "bandwidth (Hz)"
    source: "Nyquist (1928); Johnson (1928)"
    certainty: 100

  - law: "Non-coherent integration improvement (square-law detector)"
    equation: "Ii = sqrt(N)"
    variables:
      Ii: "integration improvement factor (reduces required single-pulse SNR)"
      N: "number of independent pulses integrated"
    source: "Skolnik, Introduction to Radar Systems, 3rd ed. (2001), ch. 2; Barton"
    certainty: 90
    note: |
      For a square-law (envelope) detector with unknown signal phase, the
      improvement is between sqrt(N) (low per-pulse SNR) and N (high per-pulse
      SNR). Faint-emission detection is the low-SNR regime, so sqrt(N) is the
      conservative bound and ~N^0.7 a typical mid value. Coherent integration
      (Ii = N) requires phase/timing coherence the ESM does NOT have for an LPI
      waveform with an unknown spreading code.

  - law: "Atmospheric absorption (ITU-R P.676)"
    equation: "L_atm = alpha * d"
    variables:
      L_atm: "atmospheric loss (dB)"
      alpha: "specific attenuation (dB/km)"
      d: "path length (km)"
    source: "ITU-R Recommendation P.676-12 (2019)"
    certainty: 95
    note: "At 14.4 GHz, clear air: alpha ~= 0.14 dB/km (O2 + water vapor, sea level)"

# STEP 3: Detection / receiver parameters
signal_processing_parameters:
  - parameter: "Single-pulse SNR threshold (Pd~0.9, Pfa~1e-6, square-law)"
    value: 13.2
    unit: "dB"
    source: "Skolnik (2001) / Marcum (1960) detection curves, N=1"
    certainty: 85

  - parameter: "ESM receiver noise figure (Ku-band, mass production)"
    value: 4
    unit: "dB"
    source: "Representative Ku-band LNA, ~2015 technology"
    certainty: 75

  - parameter: "Analysis bandwidth"
    value: 10
    unit: "MHz"
    source: "Approx. bandwidth to capture MADL bursts (assumed ~50 Mbps class)"
    certainty: 65

  - parameter: "Integration time (dwell)"
    value: 1.0
    unit: "seconds"
    source: "Practical dwell for a tactical ESM search"
    certainty: 85

# STEP 4: Engineering constraints
engineering_constraints:
  - constraint_type: "MADL duty cycle"
    limit_value: "~5% (bursty, LPI)"
    basis: "Thermal budget + LPI emission control"
    source: "reasoning_chains/madl_tx_power.yaml"
    certainty: 70

  - constraint_type: "MADL burst duration"
    limit_value: "~100 us per burst"
    basis: "~5000-bit track update at ~50 Mbps"
    calculation: "5000 bits / 50e6 bps = 100 us"
    certainty: 65

  - constraint_type: "ESM field of view"
    limit_value: "+/-60 deg"
    basis: "Wide-FOV search drops effective gain well below aperture peak (~27 dBi -> ~10 dBi)"
    certainty: 80

# STEP 5: Logical deduction chain (numbers recomputed for consistency)
logical_steps:
  - step: 1
    premise: "Sidelobe EIRP = TX power (dBm) + main-lobe gain (dBi) + sidelobe level (dB)"
    inference: "Power radiated toward an off-axis ESM is the sidelobe EIRP"
    conclusion: "Sidelobe EIRP ~= +34.5 dBm"
    certainty: 75
    calculation: |
      import numpy as np
      tx_power_dbm = 10*np.log10(2.0*1000)     # 2 W  -> +33.0 dBm
      eirp_sidelobe_dbm = tx_power_dbm + 31.5 + (-30.0)   # = +34.5 dBm

  - step: 2
    premise: "Noise floor = kTB + receiver noise figure"
    inference: "Thermal noise sets ESM sensitivity"
    conclusion: "Noise floor ~= -100 dBm (10 MHz, NF 4 dB)"
    certainty: 90
    calculation: |
      import numpy as np
      k, T, B = 1.38e-23, 290.0, 10e6
      noise_floor_dbm = 10*np.log10(k*T*B/1e-3) + 4.0   # -104 + 4 = -100.0 dBm

  - step: 3
    premise: "N = burst_rate * dwell; burst_rate = duty_cycle / burst_duration"
    inference: "ESM has ~500 bursts available to integrate in a 1 s dwell"
    conclusion: "N ~= 500 bursts"
    certainty: 75
    calculation: |
      burst_rate = 0.05 / 100e-6      # 500 Hz
      n_bursts   = burst_rate * 1.0   # 500

  - step: 4
    premise: "Non-coherent integration of N=500 (LPI waveform, phase unknown)"
    inference: "Improvement Ii ~ sqrt(N) (conservative) to ~N^0.7 (typical); NOT N"
    conclusion: "Integration improvement ~13.5 dB (sqrt N), up to ~19 dB (N^0.7)"
    certainty: 80
    calculation: |
      import numpy as np
      N = 500
      Ii_sqrtN = 10*np.log10(np.sqrt(N))   # 13.5 dB  (conservative)
      Ii_n07   = 10*np.log10(N**0.7)        # 18.9 dB  (typical mid)
      Ii_coherent = 10*np.log10(N)          # 27.0 dB  (UPPER BOUND only; see alt paths)

  - step: 5
    premise: "Required single-pulse SNR = single-pulse threshold - integration improvement"
    inference: "Minimum detectable signal = noise floor + required single-pulse SNR"
    conclusion: "MDS ~= -100 dBm (sqrt N case)"
    certainty: 80
    calculation: |
      noise_floor_dbm = -100.0
      snr1_threshold_db = 13.2
      Ii_db = 13.5                                  # sqrt(N) conservative case
      req_single_pulse_snr_db = snr1_threshold_db - Ii_db   # -0.3 dB
      mds_dbm = noise_floor_dbm + req_single_pulse_snr_db   # -100.3 dBm

  - step: 6
    premise: "Wide-FOV ESM gain ~10 dBi (aperture peak ~27 dBi de-rated for +/-60 deg)"
    inference: "Link budget: max tolerable path loss = EIRP + Rx_gain - MDS"
    conclusion: "Maximum path loss ~= 144.8 dB (sqrt N case)"
    certainty: 80
    calculation: |
      eirp_sidelobe_dbm = 34.5
      rx_gain_dbi = 10.0
      mds_dbm = -100.3
      max_path_loss_db = eirp_sidelobe_dbm + rx_gain_dbi - mds_dbm   # = 144.8 dB

  - step: 7
    premise: "Solve Friis + ITU-R P.676 atmospheric loss for range at 14.4 GHz"
    inference: "20*log10(4*pi*R/lambda) + 0.14*(R/1000) = max_path_loss"
    conclusion: "Clear-air range ~21 km (sqrt N) to ~32 km (N^0.7)"
    certainty: 80
    calculation: |
      import numpy as np
      from scipy.optimize import brentq
      lam = 3e8/14.4e9
      def rng(budget, alpha=0.14):
          pl = lambda Rk: 20*np.log10(4*np.pi*Rk*1000/lam) + alpha*Rk
          return brentq(lambda Rk: pl(Rk)-budget, 0.01, 5000)
      R_sqrtN = rng(144.8)   # ~20.6 km
      R_n07   = rng(150.2)   # ~32.0 km  (budget with Ii=18.9 dB)

  - step: 8
    premise: "Apply atmospheric variability and report a central band"
    inference: "Humidity/scatter shorten range; rain shortens it sharply"
    conclusion: "Central ~25 km; ~13 km in humidity; ~9 km in rain"
    certainty: 75
    calculation: |
      # Using the sqrt(N) budget (144.8 dB):
      #   clear air         -> ~21 km
      #   +5 dB humid/scatter -> ~13 km
      #   rain 5 mm/hr (~0.64 dB/km) -> ~9 km
      # N^0.7 budget (150.2 dB), clear air -> ~32 km
      # Central estimate (mid of non-coherent band): ~25 km

# STEP 6: Conclusion
conclusion:
  conclusion_value: 25
  value: 25
  unit: "km"
  conclusion_uncertainty: "+/- 10 km"
  uncertainty_range: "15 to 35 km"
  uncertainty: "+/- 10 km"
  confidence_level: 50
  confidence: 50
  precision: "+/- 40%"

  conditions:
    single_burst_no_integration: "~6 km"
    non_coherent_sqrtN_clear: "~21 km"
    non_coherent_N07_clear: "~32 km"
    moderate_humidity: "~13 km"
    rain_5mm_hr: "~9 km"
    coherent_upper_bound: "~55 km (ONLY if MADL waveform/timing is known)"

  reasoning: |
    Derived, not guessed, from a closed and recomputed link budget:
      1. Sidelobe EIRP +34.5 dBm (from prior chains; 70-75% confidence)
      2. ESM noise floor -100 dBm (kTB + NF; high confidence)
      3. Single-pulse threshold 13.2 dB (Skolnik, Pd~0.9, Pfa~1e-6)
      4. Non-coherent integration improvement ~13.5 dB (sqrt N) to ~19 dB (N^0.7)
      5. Friis + ITU-R P.676 atmospheric loss, solved numerically

    The dominant modelling choice is COHERENT vs NON-COHERENT integration.
    Against an LPI emission whose spreading code and burst timing are unknown,
    only non-coherent integration is realistic, giving ~21-32 km clear-air,
    central ~25 km. The ~55 km figure requires the (generally unavailable)
    coherent assumption; the old ~60 km value silently assumed near-coherent
    gain and is not defensible for a non-cooperative ESM.

    Confidence is modest (50%): the result rests on two further-derived inputs
    (TX power, sidelobe level), the integration model, and the assumed dwell.

  validation:
    unit_check: "km (distance)  OK"
    sanity_bounds: |
      Floor: ~6 km (single burst, no integration)
      Non-coherent band: ~15-35 km (atmosphere + Ii spread)
      Coherent upper bound: ~55 km (requires waveform knowledge)
      Central 25 km sits in the middle of the realistic non-coherent band.  OK
    comparison_to_known: |
      Public ESM detection ranges scale with EIRP and stealth:
      - Link 16 (non-LPI, ~200 W, omni): detected at 100+ km
      - LPI tactical datalinks: order tens of km
      MADL is low-power, beamformed and LPI, so a SHORTER passive-detection
      range than Link 16 is expected. ~25 km is consistent.  OK
    physics_check: |
      Recomputed end-to-end (sqrt N case):
        EIRP +34.5 dBm, Rx +10 dBi, MDS -100.3 dBm -> budget 144.8 dB.
        brentq on FSPL(14.4 GHz)+0.14*d gives R = 20.6 km. Internally consistent.
      The headline 25 km is the centre of the 21 km (sqrt N) - 32 km (N^0.7) band.

# STEP 7: Uncertainty
uncertainty_breakdown:
  integration_model: "sqrt(N) vs N^0.7 spans ~21-32 km (dominant non-coherent spread)"
  coherent_vs_noncoherent: "separate, larger effect: coherent would give ~55 km"
  madl_tx_power: "+/- 0.5 W -> +/- ~1 dB EIRP -> +/- ~1 km"
  sidelobe_level: "+/- 3 dB -> +/- ~4 km"
  esm_noise_figure: "+/- 1 dB -> +/- ~1 km"
  atmospheric_conditions: "humidity/rain can halve the range"
  combined_non_coherent: "~ +/- 10 km within the non-coherent model"

irreducible_uncertainty: |
  Cannot know, from public data alone:
    - whether the ESM achieves any coherent gain against the MADL waveform
    - exact sidelobe level and beamforming weights
    - atmospheric state during an engagement
  These keep the honest uncertainty at roughly +/- 10 km (non-coherent case),
  with a separate, larger upside only under the coherent assumption.

# STEP 8: Tactical implications (revised with corrected physics)
tactical_implications:
  vs_radar_detection: |
    A J-20 nose AESA might detect a low-RCS F-35 at ~30-90 km (aspect-dependent).
    Non-coherent MADL detection at ~25 km therefore sits WELL INSIDE typical
    radar detection range. The earlier claim that passive MADL detection
    reliably precedes radar detection does NOT hold under realistic
    (non-coherent) assumptions; it would require coherent ESM processing.
  emission_control: |
    MADL use is still a detectable signature at short range, so EMCON
    discipline matters, but the passive-first "free warning" advantage is
    weaker than commonly stated for an LPI datalink.

# STEP 9: Alternative deduction paths
alternative_paths:
  - approach: "Coherent integration (UPPER BOUND only)"
    reasoning: |
      If the ESM could coherently integrate N=500 bursts (Ii = 10*log10(500)
      = 27 dB), the budget grows to ~158 dB and the range extends to ~55 km.
      This requires knowing/estimating the MADL spreading code and burst phase,
      which is generally not available against a well-designed LPI waveform.
      Treat ~55 km as a not-to-exceed bound, not the expected value.

  - approach: "Single-burst (no integration)"
    reasoning: |
      Required SNR ~13.2 dB on one 100 us burst -> MDS ~= -86.8 dBm,
      budget ~= 131.3 dB -> range ~= 6 km. Confirms integration is what buys
      the range, and that detection is short-range either way.

  - approach: "Worse sidelobes (-22 dB) + clear air"
    reasoning: |
      8 dB more sidelobe EIRP -> budget +8 dB -> range ~= 39 km (non-coherent).
      Plausible if conformal-array sidelobe control is poorer than -30 dB.

# Classification review
classification_status: "UNCLASSIFIED"
reasoning_basis: "Link-budget + detection physics applied to publicly derived parameters"
methodology_notes: |
  - Inputs are public (photographs, datasheets, textbook physics) or are
    themselves derived in other chains in this directory.
  - The result is a physically self-consistent ESTIMATE with explicit
    uncertainty, not a claim of ground truth.
  - The corrected non-coherent integration model is the key change from the
    earlier (over-optimistic ~60 km) version of this chain.

confidence_in_methodology: 85
confidence_in_conclusion: 50
difference_explanation: |
  The link-budget method is sound (85%). The specific 25 km value is only ~50%
  confident because it depends on two further-derived inputs (TX power, sidelobe
  level) and on the non-coherent integration model. Physics bounds the answer to
  roughly 15-35 km (non-coherent), with a coherent-case upside to ~55 km.
