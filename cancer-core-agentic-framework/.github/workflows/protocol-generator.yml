name: Treatment Protocol Generator

on:
  workflow_dispatch:
    inputs:
      cancer_type:
        description: 'Cancer type'
        required: true
        type: string
      stage:
        description: 'Cancer stage'
        required: true
        type: string
      biomarkers:
        description: 'Biomarkers JSON'
        required: true
        type: string
        default: '{"CD19":"positive"}'
      patient_age:
        description: 'Patient age'
        required: true
        type: string
        default: '55'
      performance_status:
        description: 'ECOG Performance Status (0-4)'
        required: true
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
      prior_therapies:
        description: 'Prior therapies (comma-separated)'
        required: false
        type: string
      organ_function:
        description: 'Organ function'
        required: true
        type: choice
        options:
          - normal
          - impaired

env:
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

jobs:
  generate-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build framework
        run: npm run build

      - name: Generate treatment protocol
        id: protocol
        run: |
          node -e "
            import { createCurativeTools } from './dist/tools/cancer/biotech/curativeTools.js';

            const tools = createCurativeTools(process.env.TAVILY_API_KEY);
            const designTool = tools.find(t => t.name === 'DesignCurativeProtocol');

            const params = {
              cancerType: '${{ inputs.cancer_type }}',
              stage: '${{ inputs.stage }}',
              biomarkers: JSON.parse('${{ inputs.biomarkers }}'),
              patientFactors: {
                age: parseInt('${{ inputs.patient_age }}'),
                performanceStatus: parseInt('${{ inputs.performance_status }}'),
                priorTherapies: '${{ inputs.prior_therapies }}'.split(',').filter(Boolean),
                organFunction: '${{ inputs.organ_function }}',
              },
            };

            const protocol = await designTool.handler(params);
            console.log(protocol);
          " > protocol-output.md

      - name: Create protocol artifact
        run: |
          mkdir -p protocols
          mv protocol-output.md protocols/treatment-protocol-${{ github.run_number }}.md

      - name: Upload protocol
        uses: actions/upload-artifact@v4
        with:
          name: treatment-protocol-${{ github.run_number }}
          path: protocols/
          retention-days: 365

  verify-protocol:
    runs-on: ubuntu-latest
    needs: generate-protocol
    if: ${{ env.TAVILY_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build framework
        run: npm run build

      - name: Verify protocol against latest guidelines
        run: |
          node -e "
            import { createResearchTools } from './dist/tools/cancer/research/researchTools.js';

            const apiKey = process.env.TAVILY_API_KEY;
            if (!apiKey) {
              console.log('Skipping verification - no API key');
              process.exit(0);
            }

            const tools = createResearchTools(apiKey);
            const nccnTool = tools.find(t => t.name === 'SearchNCCNGuidelines');

            console.log('Verifying protocol against NCCN guidelines...');
            console.log('');

            try {
              const result = await nccnTool.handler({
                cancerType: '${{ inputs.cancer_type }}',
                topic: 'treatment recommendations',
              });
              console.log(result.slice(0, 2000));
            } catch (error) {
              console.log('Verification error:', error.message);
            }
          "
