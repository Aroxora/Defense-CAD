name: Patient Matching - Curative Therapy Eligibility

on:
  workflow_dispatch:
    inputs:
      cancer_type:
        description: 'Cancer type (e.g., B-cell ALL, DLBCL, melanoma)'
        required: true
        type: string
      stage:
        description: 'Cancer stage (e.g., relapsed/refractory, stage III)'
        required: true
        type: string
      biomarkers:
        description: 'Biomarkers JSON (e.g., {"CD19":"positive","BCMA":"positive"})'
        required: false
        default: '{}'
        type: string
      prior_therapies:
        description: 'Prior therapies (comma-separated)'
        required: false
        default: ''
        type: string
      patient_age:
        description: 'Patient age'
        required: false
        default: '50'
        type: string

env:
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

jobs:
  match-curative-therapies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build framework
        run: npm run build

      - name: Run patient matching
        id: matching
        run: |
          node -e "
            import { createCurativeTools } from './dist/tools/cancer/biotech/curativeTools.js';
            import { ApprovedCARTProducts } from './dist/domain/biotech/index.js';

            const tools = createCurativeTools(process.env.TAVILY_API_KEY);
            const assessTool = tools.find(t => t.name === 'AssessCurativePotential');

            const params = {
              cancerType: '${{ inputs.cancer_type }}',
              stage: '${{ inputs.stage }}',
              biomarkers: JSON.parse('${{ inputs.biomarkers }}' || '{}'),
              priorTherapies: '${{ inputs.prior_therapies }}'.split(',').filter(Boolean),
            };

            console.log('='.repeat(70));
            console.log('CURATIVE THERAPY MATCHING REPORT');
            console.log('='.repeat(70));
            console.log('');
            console.log('Patient Profile:');
            console.log('  Cancer Type:', params.cancerType);
            console.log('  Stage:', params.stage);
            console.log('  Biomarkers:', JSON.stringify(params.biomarkers));
            console.log('  Prior Therapies:', params.priorTherapies.join(', ') || 'None');
            console.log('');

            const result = await assessTool.handler(params);
            const assessment = JSON.parse(result);

            console.log('='.repeat(70));
            console.log('ELIGIBLE CURATIVE THERAPIES');
            console.log('='.repeat(70));
            console.log('');

            if (assessment.eligibleTherapies.length === 0) {
              console.log('No curative biotechnologies directly indicated.');
              console.log('Consider clinical trial search or tumor board review.');
            } else {
              console.log('Found', assessment.eligibleTherapies.length, 'eligible therapies:');
              console.log('');

              for (const therapy of assessment.eligibleTherapies) {
                console.log('## ' + therapy.therapyType.replace(/_/g, ' '));
                console.log('   Name:', therapy.therapyName);
                console.log('   Status:', therapy.eligibilityStatus.toUpperCase());
                if (therapy.expectedCompleteResponseRate) {
                  console.log('   Expected CR Rate:', therapy.expectedCompleteResponseRate + '%');
                }
                if (therapy.clinicalTrialId) {
                  console.log('   Clinical Trial:', therapy.clinicalTrialId);
                  console.log('   Link: https://clinicaltrials.gov/study/' + therapy.clinicalTrialId);
                }
                console.log('   Considerations:');
                for (const c of therapy.considerations) {
                  console.log('     -', c);
                }
                console.log('');
              }
            }

            console.log('='.repeat(70));
            console.log('RECOMMENDATION');
            console.log('='.repeat(70));
            console.log('');
            console.log('Best Approach:', assessment.bestApproach);
            console.log('Rationale:', assessment.rationale);
            console.log('');
            console.log('DISCLAIMER: For research purposes only.');
            console.log('Clinical decisions require oncologist oversight.');
          "

      - name: Generate matching report artifact
        run: |
          mkdir -p reports
          echo "# Patient Matching Report" > reports/matching-report.md
          echo "" >> reports/matching-report.md
          echo "**Generated:** $(date -u)" >> reports/matching-report.md
          echo "**Cancer Type:** ${{ inputs.cancer_type }}" >> reports/matching-report.md
          echo "**Stage:** ${{ inputs.stage }}" >> reports/matching-report.md
          echo "" >> reports/matching-report.md
          echo "See workflow logs for detailed matching results." >> reports/matching-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: patient-matching-report
          path: reports/
          retention-days: 30
