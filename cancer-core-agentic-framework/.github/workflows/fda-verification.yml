name: FDA Approval Verification

on:
  schedule:
    # Run weekly on Wednesday at 8 AM UTC
    - cron: '0 8 * * 3'
  workflow_dispatch:

env:
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

jobs:
  verify-cart-approvals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build framework
        run: npm run build

      - name: Verify CAR-T FDA approvals
        run: |
          node -e "
            import { ApprovedCARTProducts } from './dist/domain/biotech/index.js';
            import { createResearchTools } from './dist/tools/cancer/research/researchTools.js';

            const apiKey = process.env.TAVILY_API_KEY;
            if (!apiKey) {
              console.log('Skipping verification - no API key');
              process.exit(0);
            }

            const tools = createResearchTools(apiKey);
            const fdaTool = tools.find(t => t.name === 'SearchFDAApprovals');

            console.log('='.repeat(70));
            console.log('CAR-T FDA APPROVAL VERIFICATION');
            console.log('Date:', new Date().toISOString());
            console.log('='.repeat(70));
            console.log('');

            for (const product of ApprovedCARTProducts) {
              console.log('Verifying:', product.tradeName || product.name);
              try {
                const result = await fdaTool.handler({
                  drugName: product.tradeName || product.name,
                  indication: 'cancer',
                });

                // Check if FDA approval is confirmed
                if (result.toLowerCase().includes('fda') && result.toLowerCase().includes('approv')) {
                  console.log('  ✓ FDA approval confirmed');
                } else {
                  console.log('  ⚠ Needs manual verification');
                }
              } catch (error) {
                console.log('  ✗ Error:', error.message);
              }
              console.log('');

              // Rate limiting
              await new Promise(r => setTimeout(r, 2000));
            }
          "

      - name: Check for new CAR-T approvals
        run: |
          node -e "
            import { createResearchTools } from './dist/tools/cancer/research/researchTools.js';

            const apiKey = process.env.TAVILY_API_KEY;
            if (!apiKey) {
              console.log('Skipping - no API key');
              process.exit(0);
            }

            const tools = createResearchTools(apiKey);
            const fdaTool = tools.find(t => t.name === 'SearchFDAApprovals');

            console.log('='.repeat(70));
            console.log('CHECKING FOR NEW CAR-T APPROVALS');
            console.log('='.repeat(70));
            console.log('');

            try {
              const result = await fdaTool.handler({
                drugName: 'CAR-T cell therapy',
                indication: 'FDA approved 2024 2025',
              });
              console.log(result.slice(0, 3000));
            } catch (error) {
              console.log('Error:', error.message);
            }
          "

  verify-mrna-trials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build framework
        run: npm run build

      - name: Verify mRNA vaccine trial status
        run: |
          node -e "
            import { KeymRNAVaccinePrograms } from './dist/domain/biotech/index.js';
            import { createResearchTools } from './dist/tools/cancer/research/researchTools.js';

            const apiKey = process.env.TAVILY_API_KEY;
            if (!apiKey) {
              console.log('Skipping - no API key');
              process.exit(0);
            }

            const tools = createResearchTools(apiKey);
            const searchTool = tools.find(t => t.name === 'SearchClinicalTrials');

            console.log('='.repeat(70));
            console.log('mRNA VACCINE TRIAL STATUS VERIFICATION');
            console.log('='.repeat(70));
            console.log('');

            for (const vaccine of KeymRNAVaccinePrograms) {
              console.log('Checking:', vaccine.name);
              console.log('  Current Phase:', vaccine.phase);
              if (vaccine.clinicalTrialId) {
                console.log('  Trial ID:', vaccine.clinicalTrialId);
              }

              try {
                const result = await searchTool.handler({
                  condition: 'cancer',
                  intervention: vaccine.name,
                });

                if (result.toLowerCase().includes('phase 3')) {
                  console.log('  → Phase 3 trial data found');
                } else if (result.toLowerCase().includes('approv')) {
                  console.log('  → POTENTIAL NEW APPROVAL DETECTED');
                }
              } catch (error) {
                console.log('  Error:', error.message);
              }
              console.log('');

              await new Promise(r => setTimeout(r, 2000));
            }
          "

  generate-verification-report:
    runs-on: ubuntu-latest
    needs: [verify-cart-approvals, verify-mrna-trials]
    steps:
      - name: Generate verification report
        run: |
          mkdir -p reports
          cat > reports/fda-verification-report.md << 'EOF'
          # FDA Approval Verification Report

          **Generated:** $(date -u)
          **Workflow Run:** ${{ github.run_number }}

          ## Summary

          This automated verification checks:
          1. All CAR-T products in database have confirmed FDA approvals
          2. New CAR-T approvals that may need to be added
          3. mRNA vaccine clinical trial phase updates
          4. Potential new approvals requiring database updates

          ## Action Items

          If new approvals are detected, update:
          - `src/domain/biotech/index.ts` - Add new products
          - Run tests to validate data integrity
          - Create PR for review

          ## Data Sources
          - FDA.gov
          - ClinicalTrials.gov
          - PubMed

          EOF

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: fda-verification-${{ github.run_number }}
          path: reports/
          retention-days: 90
