<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes shift {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(1px, -1px); }
      50% { transform: translate(0, 1px); }
      75% { transform: translate(-1px, 0); }
    }
    @keyframes orbit {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .dod-group {
      transform-origin: 32px 32px;
      animation: pulse 3s ease-in-out infinite, shift 4s ease-in-out infinite;
    }
    .stars-orbit {
      transform-origin: 32px 32px;
      animation: orbit 12s linear infinite;
    }
    .star-1 { animation: twinkle 2s ease-in-out infinite; }
    .star-2 { animation: twinkle 2s ease-in-out infinite 0.4s; }
    .star-3 { animation: twinkle 2s ease-in-out infinite 0.8s; }
    .star-4 { animation: twinkle 2s ease-in-out infinite 1.2s; }
    .star-5 { animation: twinkle 2s ease-in-out infinite 1.6s; }
  </style>

  <!-- Background -->
  <circle cx="32" cy="32" r="31" fill="#0a1628"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#1a3a5c" stroke-width="1.5"/>

  <!-- DOD Pentagon - shifting group -->
  <g class="dod-group">
    <!-- Pentagon shape (DOD symbol) -->
    <polygon
      points="32,14 45,23 42,40 22,40 19,23"
      fill="#1e4d2b"
      stroke="#3d8b40"
      stroke-width="2"/>
    <!-- Inner pentagon -->
    <polygon
      points="32,19 40,25 38,36 26,36 24,25"
      fill="#0a1628"
      stroke="#3d8b40"
      stroke-width="1"/>
    <!-- DOD text hint -->
    <text x="32" y="32" text-anchor="middle" font-size="6" fill="#3d8b40" font-family="Arial" font-weight="bold">DOD</text>
  </g>

  <!-- Orbiting PLA Stars -->
  <g class="stars-orbit">
    <!-- Star 1 - top -->
    <polygon class="star-1" points="32,4 33.5,8 38,8 34.5,10.5 36,15 32,12 28,15 29.5,10.5 26,8 30.5,8" fill="#de2910"/>
    <!-- Star 2 - top right -->
    <polygon class="star-2" points="52,16 53.5,20 58,20 54.5,22.5 56,27 52,24 48,27 49.5,22.5 46,20 50.5,20" fill="#ffde00"/>
    <!-- Star 3 - bottom right -->
    <polygon class="star-3" points="52,48 53.5,52 58,52 54.5,54.5 56,59 52,56 48,59 49.5,54.5 46,52 50.5,52" fill="#ffde00"/>
    <!-- Star 4 - bottom left -->
    <polygon class="star-4" points="12,48 13.5,52 18,52 14.5,54.5 16,59 12,56 8,59 9.5,54.5 6,52 10.5,52" fill="#ffde00"/>
    <!-- Star 5 - top left -->
    <polygon class="star-5" points="12,16 13.5,20 18,20 14.5,22.5 16,27 12,24 8,27 9.5,22.5 6,20 10.5,20" fill="#ffde00"/>
  </g>

  <!-- Outer ring accent -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#de2910" stroke-width="0.5" stroke-dasharray="3 6"/>
</svg>
